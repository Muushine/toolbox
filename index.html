<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>宝藏工具库 · 全分类海量免费工具 | 可拖拽排序+自定义分类</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif; }
        body { background: #f1f5f9; min-height: 100vh; overflow-x: hidden; }
        .app-layout { display: flex; min-height: 100vh; position: relative; }
        .sidebar-wrapper {
            position: relative;
            flex-shrink: 0;
            transition: width 0.2s ease;
            width: 0px;
            overflow: hidden;
        }
        .sidebar-wrapper.visible {
            width: 320px;
            overflow: visible;
        }
        .sidebar {
            width: 320px;
            height: 100vh;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: sticky;
            top: 0;
            padding-bottom: 1rem;
        }
        .resize-handle {
            position: absolute;
            right: -6px;
            top: 0;
            width: 14px;
            height: 100%;
            cursor: col-resize;
            z-index: 30;
            background: transparent;
            transition: background 0.2s;
            display: none;
        }
        .sidebar-wrapper.visible .resize-handle {
            display: block;
        }
        .resize-handle:hover,
        .resize-handle.active {
            background: rgba(37, 99, 235, 0.15);
            border-right: 2px solid #2563eb;
        }
        .resize-handle::after {
            content: '';
            position: absolute;
            right: 3px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 40px;
            background: #94a3b8;
            border-radius: 4px;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        .resize-handle:hover::after,
        .resize-handle.active::after {
            opacity: 0.8;
            background: #2563eb;
        }

        .main-content { flex: 1; padding: 1.5rem 2rem 2rem; min-width: 0; }
        .top-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.8rem; }
        .toggle-sidebar-btn { background: #ffffff; border: 1px solid #cbd5e1; border-radius: 2rem; padding: 0.5rem 1rem; font-size: 0.9rem; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .hero-title { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, #0f2b3d, #1e4a76); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .badge-count { background: #e2e8f0; padding: 0.2rem 0.7rem; border-radius: 40px; font-size: 0.75rem; font-weight: 600; }
        .section-card { background: #fefefe; margin: 1rem 1rem; padding: 1rem; border-radius: 1.5rem; border: 1px solid #edf2f7; }
        .section-title { font-weight: 600; margin-bottom: 0.8rem; font-size: 0.9rem; color: #334155; }
        .form-group { margin-bottom: 0.8rem; }
        .form-group label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #475569; display: block; margin-bottom: 0.2rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.6rem 0.8rem; border-radius: 1rem; border: 1px solid #cbd5e1; font-size: 0.85rem; background: white; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.8rem; border-radius: 2rem; background: #2563eb; color: white; border: none; cursor: pointer; width: 100%; font-weight: 500; }
        .btn-outline-sm { background: transparent; border: 1px solid #cbd5e1; color: #1f2b48; }
        .file-zone-sm { border: 1px dashed #94a3b8; border-radius: 1rem; padding: 0.6rem; text-align: center; font-size: 0.75rem; cursor: pointer; background: #fefce8; margin-top: 6px; }
        .sortable-cat-list { margin-top: 10px; background: #f9fafb; border-radius: 1rem; padding: 0.5rem; max-height: 260px; overflow-y: auto; }
        .cat-sort-item { background: white; border: 1px solid #e2e8f0; border-radius: 2rem; padding: 0.4rem 0.8rem; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; cursor: grab; }
        .drag-handle { font-size: 1rem; cursor: grab; color: #94a3b8; user-select: none; }
        .cat-name-inline { flex: 1; font-size: 0.8rem; font-weight: 500; padding: 2px 4px; border-radius: 30px; cursor: pointer; }
        .cat-name-inline:hover { background: #f1f5f9; text-decoration: underline dotted #3b82f6; }
        .del-cat-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1rem; width: 24px; }
        .add-cat-row { display: flex; gap: 6px; margin-top: 8px; }
        .cats-scroll { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.8rem; }
        .cat-quick-btn { background: white; border: 1px solid #cbd5e1; border-radius: 2rem; padding: 0.3rem 1rem; font-size: 0.8rem; cursor: pointer; }
        .cat-quick-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 1.2rem; }
        .tool-card { background: white; border-radius: 1.2rem; padding: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #e9edf2; transition: all 0.2s; cursor: grab; user-select: none; }
        .tool-card:hover { transform: translateY(-2px); border-color: #cbdff2; }
        .tool-card.dragging { opacity: 0.3; border: 2px dashed #2563eb; transform: scale(0.95); }
        .tool-card.drag-over { border: 2px solid #2563eb; background: #f0f7ff; transform: scale(1.02); }
        .tool-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .tool-cat-badge { background: #eef2ff; font-size: 0.65rem; padding: 0.2rem 0.6rem; border-radius: 20px; color: #1e40af; }
        .tool-actions button { background: none; border: none; cursor: pointer; font-size: 0.9rem; padding: 0 4px; color: #7c8ba0; }
        .tool-name { font-weight: 700; font-size: 1rem; margin: 6px 0 4px; }
        .tool-desc { font-size: 0.75rem; color: #475569; margin-bottom: 8px; }
        .tool-link { background: #f8fafc; padding: 0.4rem 0.6rem; border-radius: 1rem; font-size: 0.7rem; display: flex; justify-content: space-between; }
        .empty-state { text-align: center; padding: 3rem; background: white; border-radius: 1.5rem; grid-column: 1/-1; }
        footer { margin-top: 2rem; text-align: center; font-size: 0.7rem; color: #94a3b8; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; max-width: 400px; width: 90%; border-radius: 1.5rem; padding: 1.5rem; }
        @media (max-width: 700px) { .main-content { padding: 1rem; } .sidebar-wrapper.visible { width: 280px !important; } .resize-handle { display: none !important; } }
        .drag-tool-handle { font-size: 1.2rem; color: #94a3b8; cursor: grab; margin-right: 4px; user-select: none; }
    </style>
</head>
<body>
<div class="app-layout">
    <div class="sidebar-wrapper" id="sidebarWrapper">
        <aside class="sidebar" id="sidebar">
            <div class="section-card" style="margin-top:1rem;">
                <div class="section-title">🔗 添加网址工具</div>
                <div class="form-group"><label>名称</label><input type="text" id="linkName" placeholder="例如: 在线音频剪辑"></div>
                <div class="form-group"><label>链接</label><input type="url" id="linkUrl" placeholder="https://..."></div>
                <div class="form-group"><label>分类</label><select id="linkCategorySelect"></select></div>
                <div class="form-group"><label>描述</label><input type="text" id="linkDesc" placeholder="简短描述"></div>
                <button class="btn-sm" id="addLinkBtn">➕ 增添链接</button>
            </div>
            <div class="section-card">
                <div class="section-title">📁 上传HTML工具</div>
                <div class="form-group"><label>工具名称</label><input type="text" id="htmlToolName" placeholder="HTML工具名称"></div>
                <div class="form-group"><label>分类</label><select id="htmlCategorySelect"></select></div>
                <div class="form-group"><label>描述</label><input type="text" id="htmlDesc" placeholder="功能简介"></div>
                <div class="file-zone-sm" id="fileDropZone">📂 点击或拖拽 .html 文件</div>
                <input type="file" id="htmlFileInput" accept=".html,.htm" style="display:none;">
                <button class="btn-sm btn-outline-sm" id="uploadHtmlBtn" style="margin-top: 8px;">✨ 上传保存</button>
            </div>
            <div class="section-card">
                <div class="section-title">🏷️ 分类管理 (拖拽排序·单击名字编辑)</div>
                <div class="add-cat-row">
                    <input type="text" id="newCatName" placeholder="新分类名称" style="flex:1; padding:0.4rem; border-radius: 1rem; border:1px solid #cbd5e1;">
                    <button id="addCategoryBtn" class="btn-sm" style="width: auto; padding: 0 12px;">➕</button>
                </div>
                <div class="sortable-cat-list" id="sortableCatList"></div>
                <div class="cat-help-text" style="font-size:0.65rem; margin-top:6px;">💡 拖拽⋮⋮排序 | 单击分类名直接修改</div>
            </div>
            <div style="padding: 0 1rem 1.2rem;">
                <button id="exportDataBtn" class="btn-sm btn-outline-sm" style="margin-bottom: 6px;">📎 导出备份</button>
                <label for="importFile" class="btn-sm btn-outline-sm" style="display: block; text-align: center; cursor: pointer;">📂 导入数据</label>
                <input type="file" id="importFile" accept=".json" style="display:none;">
            </div>
        </aside>
        <div class="resize-handle" id="resizeHandle"></div>
    </div>

    <main class="main-content">
        <div class="top-bar">
            <button class="toggle-sidebar-btn" id="toggleSidebarBtn">☰ 展开侧栏</button>
            <div class="hero-title">🧰 全能工具箱 · 海量免费资源 <span id="toolCountBadge" class="badge-count">0</span></div>
            <button id="resetAllCategoryBtn" class="toggle-sidebar-btn" style="padding: 0.4rem 1rem;">📌 全部工具</button>
        </div>
        <div id="quickCatsBar" class="cats-scroll"></div>
        <div id="toolsGrid" class="tools-grid"></div>
        <footer>✨ 内置超120+高质量免费工具 | 覆盖开发/设计/转换/AI/媒体等 | 分类拖拽排序 | 单击分类名可重命名 | 支持自行增添任意工具</footer>
    </main>
</div>

<div id="editModal" class="modal">
    <div class="modal-card">
        <h3 style="margin-bottom:1rem;">✏️ 编辑工具</h3>
        <div class="form-group"><label>名称</label><input id="editName"></div>
        <div class="form-group"><label>分类</label><select id="editCategory"></select></div>
        <div class="form-group"><label>描述</label><input id="editDesc"></div>
        <div class="form-group" id="editUrlGroup"><label>链接</label><input id="editUrl"></div>
        <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:1rem;">
            <button class="btn-outline-sm" id="closeModalBtn">取消</button>
            <button class="btn-sm" id="saveEditBtn">保存</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'toolbox_ultimate_v9';
    const CAT_ORDER_KEY = 'toolbox_cat_order_v4';
    const TOOL_ORDER_KEY = 'toolbox_tool_order_v1';
    const SIDEBAR_WIDTH_KEY = 'toolbox_sidebar_width';

    let tools = [];
    let currentCategory = 'all';
    let editingId = null;
    const BASE_CATEGORIES = ['开发工具','设计神器','文档处理','在线转换','实用查询','AI助手','图片工具','视频工具','音频工具','其他'];
    let customCategories = [];
    let categoryOrder = [];
    let toolOrder = [];

    // ----- 侧边栏宽度控制 -----
    function loadSidebarWidth() {
        const stored = localStorage.getItem(SIDEBAR_WIDTH_KEY);
        if (stored) {
            const w = parseInt(stored, 10);
            if (w > 200 && w < 600) return w;
        }
        return 320;
    }
    function saveSidebarWidth(w) {
        localStorage.setItem(SIDEBAR_WIDTH_KEY, String(w));
    }

    // ----- 拖拽调整宽度 -----
    let isResizing = false;
    let startX = 0;
    let startWidth = 0;

    function initResize() {
        const handle = document.getElementById('resizeHandle');
        const wrapper = document.getElementById('sidebarWrapper');
        if (!handle || !wrapper) return;

        handle.addEventListener('mousedown', (e) => {
            e.preventDefault();
            isResizing = true;
            startX = e.clientX;
            startWidth = wrapper.offsetWidth || 320;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            handle.classList.add('active');
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const delta = e.clientX - startX;
            let newWidth = startWidth + delta;
            newWidth = Math.min(600, Math.max(220, newWidth));
            wrapper.style.width = newWidth + 'px';
            saveSidebarWidth(newWidth);
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                const handleEl = document.getElementById('resizeHandle');
                if (handleEl) handleEl.classList.remove('active');
                const wrapperEl = document.getElementById('sidebarWrapper');
                if (wrapperEl) {
                    saveSidebarWidth(wrapperEl.offsetWidth);
                }
            }
        });

        handle.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            if (!touch) return;
            isResizing = true;
            startX = touch.clientX;
            startWidth = wrapper.offsetWidth || 320;
            handle.classList.add('active');
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (!isResizing) return;
            const touch = e.touches[0];
            if (!touch) return;
            const delta = touch.clientX - startX;
            let newWidth = startWidth + delta;
            newWidth = Math.min(600, Math.max(220, newWidth));
            wrapper.style.width = newWidth + 'px';
            saveSidebarWidth(newWidth);
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchend', () => {
            if (isResizing) {
                isResizing = false;
                const handleEl = document.getElementById('resizeHandle');
                if (handleEl) handleEl.classList.remove('active');
                const wrapperEl = document.getElementById('sidebarWrapper');
                if (wrapperEl) {
                    saveSidebarWidth(wrapperEl.offsetWidth);
                }
            }
        });
    }

    // ----- 工具排序相关 -----
    function loadToolOrder() {
        const stored = localStorage.getItem(TOOL_ORDER_KEY);
        if (stored) {
            try { toolOrder = JSON.parse(stored); if (!Array.isArray(toolOrder)) toolOrder = []; } catch(e) { toolOrder = []; }
        } else {
            toolOrder = [];
        }
    }
    function saveToolOrder() {
        localStorage.setItem(TOOL_ORDER_KEY, JSON.stringify(toolOrder));
    }
    function getOrderedTools(toolsArray) {
        if (!toolOrder || toolOrder.length === 0) return toolsArray;
        const ordered = [];
        const remaining = [];
        const toolMap = {};
        toolsArray.forEach(t => toolMap[t.id] = t);
        toolOrder.forEach(id => {
            if (toolMap[id]) {
                ordered.push(toolMap[id]);
                delete toolMap[id];
            }
        });
        for (const id in toolMap) {
            remaining.push(toolMap[id]);
        }
        return ordered.concat(remaining);
    }

    // ----- 分类排序相关 -----
    function loadCategoryOrder() {
        const stored = localStorage.getItem(CAT_ORDER_KEY);
        if (stored) { try { categoryOrder = JSON.parse(stored); if (!Array.isArray(categoryOrder)) categoryOrder = [...BASE_CATEGORIES]; } catch(e) { categoryOrder = [...BASE_CATEGORIES]; } } 
        else { categoryOrder = [...BASE_CATEGORIES]; }
        syncCustomFromOrder();
    }
    function saveCategoryOrder() { localStorage.setItem(CAT_ORDER_KEY, JSON.stringify(categoryOrder)); }
    function syncCustomFromOrder() { const custom = categoryOrder.filter(c => !BASE_CATEGORIES.includes(c)); customCategories = [...new Set(custom)]; saveCustomToLocal(); }
    function saveCustomToLocal() { localStorage.setItem('toolbox_custom_cats', JSON.stringify(customCategories)); }
    function loadCustomCategories() {
        const stored = localStorage.getItem('toolbox_custom_cats');
        if (stored) { try { customCategories = JSON.parse(stored); if (!Array.isArray(customCategories)) customCategories = []; } catch(e) { customCategories = []; } } 
        else { customCategories = []; }
        loadCategoryOrder();
        customCategories.forEach(c => { if (!categoryOrder.includes(c)) categoryOrder.push(c); });
        saveCategoryOrder();
    }
    function getSortedCategoryList() { return [...categoryOrder]; }
    
    function renameCategory(oldName, newName) {
        if (!newName || newName.trim() === '') return false;
        newName = newName.trim();
        if (oldName === newName) return false;
        const allCats = getSortedCategoryList();
        if (allCats.includes(newName)) { alert(`分类 "${newName}" 已存在`); return false; }
        tools = tools.map(tool => { if (tool.category === oldName) return { ...tool, category: newName }; return tool; });
        const index = categoryOrder.indexOf(oldName);
        if (index !== -1) categoryOrder[index] = newName;
        if (customCategories.includes(oldName)) customCategories = customCategories.map(c => c === oldName ? newName : c);
        saveCategoryOrder(); saveCustomToLocal(); saveTools(); renderAllUI();
        return true;
    }
    function addCustomCategory(name) {
        if (!name.trim()) return false;
        if (getSortedCategoryList().includes(name.trim())) return false;
        categoryOrder.push(name.trim());
        if (!BASE_CATEGORIES.includes(name.trim())) customCategories.push(name.trim());
        saveCategoryOrder(); saveCustomToLocal(); renderAllUI();
        return true;
    }
    function deleteCategory(catName) {
        if (BASE_CATEGORIES.includes(catName)) { alert("内置分类不能删除，但可以修改名字"); return false; }
        if (confirm(`删除分类“${catName}”？工具将移至“其他”`)) {
            tools = tools.map(t => t.category === catName ? { ...t, category: '其他' } : t);
            categoryOrder = categoryOrder.filter(c => c !== catName);
            customCategories = customCategories.filter(c => c !== catName);
            saveCategoryOrder(); saveCustomToLocal(); saveTools(); renderAllUI();
            return true;
        }
        return false;
    }
    function updateAllSelects() {
        const sorted = getSortedCategoryList();
        ['linkCategorySelect', 'htmlCategorySelect', 'editCategory'].forEach(id => {
            const sel = document.getElementById(id);
            if (!sel) return;
            const cur = sel.value;
            sel.innerHTML = '';
            sorted.forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.textContent = c; sel.appendChild(opt); });
            if (cur && sorted.includes(cur)) sel.value = cur;
            else if (sorted.length) sel.value = sorted[0];
        });
    }
    
    function renderSortableCatList() {
        const sorted = getSortedCategoryList();
        const container = document.getElementById('sortableCatList');
        if (!container) return;
        container.innerHTML = '';
        sorted.forEach(cat => {
            const item = document.createElement('div'); item.className = 'cat-sort-item'; item.setAttribute('data-cat', cat);
            const isBuiltin = BASE_CATEGORIES.includes(cat);
            item.innerHTML = `<span class="drag-handle">⋮⋮</span><span class="cat-name-inline" data-cat="${escapeHtml(cat)}">${escapeHtml(cat)}</span>${!isBuiltin ? `<button class="del-cat-btn" data-cat="${escapeHtml(cat)}">✖</button>` : '<span style="width:24px;"></span>'}`;
            container.appendChild(item);
        });
        document.querySelectorAll('.del-cat-btn').forEach(btn => btn.addEventListener('click', (e) => { deleteCategory(btn.getAttribute('data-cat')); e.stopPropagation(); }));
        document.querySelectorAll('.cat-name-inline').forEach(span => {
            span.addEventListener('click', (e) => {
                e.stopPropagation();
                if (span.classList.contains('editing')) return;
                const oldName = span.getAttribute('data-cat');
                const input = document.createElement('input');
                input.type = 'text'; input.value = span.innerText;
                input.className = 'cat-name-inline editing';
                input.style.border = '1px solid #3b82f6'; input.style.borderRadius = '30px'; input.style.padding = '4px 8px'; input.style.outline = 'none';
                span.style.display = 'none';
                span.parentNode.insertBefore(input, span);
                input.focus();
                const save = () => {
                    const newVal = input.value.trim();
                    if (newVal && newVal !== oldName) renameCategory(oldName, newVal);
                    input.remove(); span.style.display = 'inline'; renderAllUI();
                };
                input.addEventListener('blur', save);
                input.addEventListener('keypress', (e) => { if (e.key === 'Enter') save(); });
            });
        });
        let dragSrcIndex = null;
        const items = document.querySelectorAll('.cat-sort-item');
        const handleDragStart = (e) => { const el = e.target.closest('.cat-sort-item'); if(!el) return; dragSrcIndex = Array.from(el.parentNode.children).indexOf(el); e.dataTransfer.effectAllowed = 'move'; el.style.opacity = '0.5'; };
        const handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
        const handleDrop = (e) => { e.preventDefault(); const target = e.target.closest('.cat-sort-item'); if(!target || dragSrcIndex === null) return; const newOrder = [...categoryOrder]; const [moved] = newOrder.splice(dragSrcIndex,1); const dropIndex = Array.from(document.querySelectorAll('.cat-sort-item')).indexOf(target); newOrder.splice(dropIndex,0,moved); categoryOrder = newOrder; saveCategoryOrder(); syncCustomFromOrder(); renderAllUI(); dragSrcIndex=null; };
        const handleDragEnd = (e) => { if(e.target.closest('.cat-sort-item')) e.target.closest('.cat-sort-item').style.opacity = ''; dragSrcIndex=null; };
        items.forEach(item => { item.setAttribute('draggable','true'); item.addEventListener('dragstart',handleDragStart); item.addEventListener('dragover',handleDragOver); item.addEventListener('drop',handleDrop); item.addEventListener('dragend',handleDragEnd); });
    }
    
    // ===================== 内置工具 =====================
    const builtInTools = [
        { name: 'JSON.cn 格式化', type: 'link', url: 'https://www.json.cn/', category: '开发工具', description: 'JSON解析/格式化/校验' },
        { name: 'RegEx101 正则', type: 'link', url: 'https://regex101.com/', category: '开发工具', description: '正则表达式测试+解释' },
        { name: 'CodePen 前端实验室', type: 'link', url: 'https://codepen.io/pen/', category: '开发工具', description: 'HTML/CSS/JS在线调试' },
        { name: 'Carbon 代码截图', type: 'link', url: 'https://carbon.now.sh/', category: '开发工具', description: '生成漂亮代码图片' },

    function initTools() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try { let parsed = JSON.parse(stored); if (Array.isArray(parsed) && parsed.length) { tools = parsed.map(t => ({ ...t, type: t.type || 'link' })); return; } } catch(e) {}
        }
        tools = builtInTools.map((t, idx) => ({ id: `builtin_${Date.now()}_${idx}_${Math.random().toString(36).substr(2, 4)}`, ...t, createdAt: Date.now() }));
        saveTools();
    }
    function saveTools() { 
        const toStore = tools.map(t => t.type === 'html' && t.blobContent ? { ...t, blobContent: t.blobContent } : t);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(toStore));
        document.getElementById('toolCountBadge').innerText = tools.length;
        const allIds = tools.map(t => t.id);
        toolOrder = toolOrder.filter(id => allIds.includes(id));
        const newIds = allIds.filter(id => !toolOrder.includes(id));
        toolOrder = toolOrder.concat(newIds);
        saveToolOrder();
    }
    function addLinkTool(name, url, category, desc) {
        if (!name.trim() || !url.trim()) { alert('请填写名称和链接'); return false; }
        let finalUrl = url.trim();
        if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) finalUrl = 'https://' + finalUrl;
        const newTool = { id: Date.now()+'-'+Math.random().toString(36).substr(2,6), name: name.trim(), type: 'link', url: finalUrl, category, description: desc.trim() || '点击访问', createdAt: Date.now() };
        tools.unshift(newTool);
        toolOrder = [newTool.id, ...toolOrder];
        saveToolOrder();
        saveTools(); renderAllUI(); return true;
    }
    function addHtmlTool(name, htmlContent, category, desc) {
        if (!name.trim()) { alert('请填写工具名称'); return false; }
        const newTool = { id: Date.now()+'-'+Math.random().toString(36).substr(2,8), name: name.trim(), type: 'html', blobContent: htmlContent, category, description: desc.trim() || '自上传HTML工具', createdAt: Date.now() };
        tools.unshift(newTool);
        toolOrder = [newTool.id, ...toolOrder];
        saveToolOrder();
        saveTools(); renderAllUI(); return true;
    }
    function deleteTool(id) { if (confirm('删除该工具？')) { tools = tools.filter(t => t.id != id); toolOrder = toolOrder.filter(tid => tid !== id); saveToolOrder(); saveTools(); renderAllUI(); } }
    function updateTool(id, newName, newCategory, newDesc, newUrl, type) {
        const idx = tools.findIndex(t => t.id == id);
        if (idx === -1) return;
        let updated = { ...tools[idx], name: newName.trim(), category: newCategory, description: newDesc.trim() };
        if (type === 'link') {
            let finalUrl = newUrl.trim();
            if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) finalUrl = 'https://' + finalUrl;
            updated.url = finalUrl; updated.type = 'link'; delete updated.blobContent;
        } else { updated.type = 'html'; }
        tools[idx] = updated; saveTools(); renderAllUI();
    }
    function getFilteredTools() { 
        const filtered = currentCategory === 'all' ? [...tools] : tools.filter(t => t.category === currentCategory);
        return getOrderedTools(filtered);
    }
    function renderToolsGrid() {
        const filtered = getFilteredTools();
        const grid = document.getElementById('toolsGrid');
        if (!filtered.length) { grid.innerHTML = '<div class="empty-state">🎯 暂无工具，从左侧边栏添加或上传～</div>'; return; }
        grid.innerHTML = '';
        filtered.forEach(tool => {
            const isHtml = tool.type === 'html';
            const card = document.createElement('div'); card.className = 'tool-card'; card.setAttribute('draggable', 'true'); card.dataset.toolId = tool.id;
            card.innerHTML = `
                <div class="tool-header">
                    <span class="tool-cat-badge">${escapeHtml(tool.category)}</span>
                    <div class="tool-actions">
                        <button class="edit-tool" data-id="${tool.id}">✏️</button>
                        <button class="del-tool" data-id="${tool.id}">🗑️</button>
                    </div>
                </div>
                <div class="tool-name"><span class="drag-tool-handle">⠿</span> ${escapeHtml(tool.name)}</div>
                <div class="tool-desc">${escapeHtml(tool.description)}</div>
                <div class="tool-link">${isHtml ? '<span>📁 HTML应用</span>' : `<a href="${escapeHtml(tool.url)}" target="_blank" rel="noopener">🔗 打开工具</a>`}<button class="copy-action" data-id="${tool.id}" data-type="${isHtml ? 'html' : 'link'}">${isHtml ? '▶️ 运行' : '📋 复制'}</button></div>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll('.del-tool').forEach(btn => btn.addEventListener('click', (e) => deleteTool(btn.getAttribute('data-id'))));
        document.querySelectorAll('.edit-tool').forEach(btn => btn.addEventListener('click', (e) => openEditModal(btn.getAttribute('data-id'))));
        document.querySelectorAll('.copy-action').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const tid = btn.getAttribute('data-id');
                const tool = tools.find(t => t.id == tid);
                if (!tool) return;
                if (tool.type === 'link') { try { await navigator.clipboard.writeText(tool.url); alert('链接已复制'); } catch(err) { prompt('复制链接:', tool.url); } }
                else if (tool.type === 'html' && tool.blobContent) { const url = URL.createObjectURL(new Blob([tool.blobContent], {type: 'text/html'})); window.open(url, '_blank'); setTimeout(() => URL.revokeObjectURL(url), 60000); }
                e.stopPropagation();
            });
        });

        // ----- 工具卡片拖拽排序 (修复版) -----
        let dragSrcElement = null;
        let dragSrcId = null;

        const cards = grid.querySelectorAll('.tool-card');

        const handleDragStart = (e) => {
            const el = e.target.closest('.tool-card');
            if (!el) return;
            dragSrcElement = el;
            dragSrcId = el.dataset.toolId;
            el.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', dragSrcId);
            // 延迟设置拖拽图像，避免卡顿
            setTimeout(() => {
                if (el) el.style.opacity = '0.4';
            }, 0);
        };

        const handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const target = e.target.closest('.tool-card');
            if (target && target !== dragSrcElement && !target.classList.contains('dragging')) {
                // 清除其他高亮
                document.querySelectorAll('.tool-card.drag-over').forEach(c => c.classList.remove('drag-over'));
                target.classList.add('drag-over');
            }
        };

        const handleDragLeave = (e) => {
            const target = e.target.closest('.tool-card');
            if (target) {
                target.classList.remove('drag-over');
            }
        };

        const handleDrop = (e) => {
            e.preventDefault();
            const target = e.target.closest('.tool-card');
            if (!target) return;
            target.classList.remove('drag-over');

            const dropId = target.dataset.toolId;
            if (!dragSrcId || !dropId || dragSrcId === dropId) {
                cleanupDrag();
                return;
            }

            // 执行排序：从 toolOrder 中移动
            const dragIndex = toolOrder.indexOf(dragSrcId);
            const dropIndex = toolOrder.indexOf(dropId);
            if (dragIndex === -1 || dropIndex === -1) {
                cleanupDrag();
                return;
            }

            // 移除拖拽元素
            toolOrder.splice(dragIndex, 1);
            // 计算新的插入位置 (因为移除后索引变化)
            const newDropIndex = toolOrder.indexOf(dropId);
            if (newDropIndex === -1) {
                toolOrder.push(dragSrcId);
            } else {
                toolOrder.splice(newDropIndex, 0, dragSrcId);
            }

            saveToolOrder();
            cleanupDrag();
            renderAllUI(); // 重新渲染
        };

        const handleDragEnd = (e) => {
            cleanupDrag();
        };

        const cleanupDrag = () => {
            if (dragSrcElement) {
                dragSrcElement.classList.remove('dragging');
                dragSrcElement.style.opacity = '';
            }
            document.querySelectorAll('.tool-card.drag-over').forEach(c => c.classList.remove('drag-over'));
            dragSrcElement = null;
            dragSrcId = null;
        };

        cards.forEach(card => {
            card.addEventListener('dragstart', handleDragStart);
            card.addEventListener('dragover', handleDragOver);
            card.addEventListener('dragleave', handleDragLeave);
            card.addEventListener('drop', handleDrop);
            card.addEventListener('dragend', handleDragEnd);
        });
    }

        allBtn.textContent = '📌 全部';

        bar.appendChild(allBtn);

        sorted.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `cat-quick-btn ${currentCategory === cat ? 'active' : ''}`;
            btn.textContent = cat;
            btn.style.background = currentCategory === cat ? '#2563eb' : 'white';
            btn.onclick = () => { currentCategory = cat; renderAllUI(); };
            bar.appendChild(btn);
        });
    }

        const sorted = getSortedCategoryList();
        catSel.innerHTML = '';
        sorted.forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.textContent = c; if (tool.category === c) opt.selected = true; catSel.appendChild(opt); });
        document.getElementById('editDesc').value = tool.description || '';
        const urlGroup = document.getElementById('editUrlGroup');
        if (tool.type === 'link') { urlGroup.style.display = 'block'; document.getElementById('editUrl').value = tool.url || ''; }
        else urlGroup.style.display = 'none';
        document.getElementById('editModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('editModal').style.display = 'none'; editingId = null; }
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('saveEditBtn').addEventListener('click', () => {
        if (!editingId) return;
        const tool = tools.find(t => t.id == editingId);
        if (!tool) return;
        const newName = document.getElementById('editName').value.trim();
        const newCat = document.getElementById('editCategory').value;
        const newDesc = document.getElementById('editDesc').value.trim();
        if (!newName) { alert('名称不能为空'); return; }
        if (tool.type === 'link') {
            let newUrl = document.getElementById('editUrl').value.trim();
            if (!newUrl) { alert('链接不能为空'); return; }
            updateTool(editingId, newName, newCat, newDesc, newUrl, 'link');
        } else updateTool(editingId, newName, newCat, newDesc, '', 'html');
        closeModal();
    });
    
    // ----- 侧边栏展开/收起 -----
    const sidebar = document.getElementById('sidebar');
    const sidebarWrapper = document.getElementById('sidebarWrapper');
    const toggleBtn = document.getElementById('toggleSidebarBtn');
    let isSidebarVisible = false;

    function updateToggleButton() {
        toggleBtn.innerHTML = isSidebarVisible ? '☰ 收起侧栏' : '☰ 展开侧栏';
    }

    function showSidebar() {
        isSidebarVisible = true;
        sidebarWrapper.classList.add('visible');
        const w = loadSidebarWidth();
        sidebarWrapper.style.width = w + 'px';
        updateToggleButton();
    }

    function hideSidebar() {
        isSidebarVisible = false;
        sidebarWrapper.classList.remove('visible');
        sidebarWrapper.style.width = '0px';
        updateToggleButton();
    }

    toggleBtn.onclick = () => {
        if (isSidebarVisible) {
            hideSidebar();
        } else {
            showSidebar();
        }
    };

    hideSidebar();

    window.addEventListener('resize', () => {
        if (window.innerWidth <= 700 && isSidebarVisible) {
            hideSidebar();
        }
    });

    // ----- 事件绑定 -----
    document.getElementById('addCategoryBtn').onclick = () => { const val = document.getElementById('newCatName').value.trim(); if(val && addCustomCategory(val)) document.getElementById('newCatName').value = ''; else alert('分类名无效或已存在'); };
    document.getElementById('addLinkBtn').onclick = () => { const n=document.getElementById('linkName').value, u=document.getElementById('linkUrl').value, c=document.getElementById('linkCategorySelect').value, d=document.getElementById('linkDesc').value; if(addLinkTool(n,u,c,d)){ document.getElementById('linkName').value=''; document.getElementById('linkUrl').value=''; document.getElementById('linkDesc').value=''; } };
    const fileZone=document.getElementById('fileDropZone'), fileInput=document.getElementById('htmlFileInput');
    fileZone.onclick=()=>fileInput.click();
    fileZone.ondragover=e=>e.preventDefault();
    fileZone.ondrop=e=>{ e.preventDefault(); const f=e.dataTransfer.files[0]; if(f&&f.name.endsWith('.html')) handleHtmlFile(f); else alert('请上传.html文件'); };
    fileInput.onchange=e=>{ if(e.target.files.length) handleHtmlFile(e.target.files[0]); fileInput.value=''; };
    function handleHtmlFile(file){ const reader=new FileReader(); reader.onload=ev=>{ const name=document.getElementById('htmlToolName').value.trim()||file.name.replace(/\.html$/i,''), cat=document.getElementById('htmlCategorySelect').value, desc=document.getElementById('htmlDesc').value; if(addHtmlTool(name,ev.target.result,cat,desc)){ document.getElementById('htmlToolName').value=''; document.getElementById('htmlDesc').value=''; alert(`HTML工具“${name}”添加成功`); } }; reader.readAsText(file); }
    document.getElementById('uploadHtmlBtn').onclick=()=>{ if(fileInput.files.length) handleHtmlFile(fileInput.files[0]); else alert('请选择文件'); };
    document.getElementById('exportDataBtn').onclick=()=>{ const data={ tools, categoryOrder, customCategories, toolOrder }; const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='toolbox_backup.json'; a.click(); URL.revokeObjectURL(a.href); };
    document.getElementById('importFile').onchange=e=>{ const file=e.target.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=ev=>{ try{ const imp=JSON.parse(ev.target.result); if(imp.tools){ tools=imp.tools; if(imp.categoryOrder) categoryOrder=imp.categoryOrder; if(imp.customCategories) customCategories=imp.customCategories; if(imp.toolOrder) toolOrder=imp.toolOrder; else toolOrder=[]; saveCategoryOrder(); saveCustomToLocal(); saveToolOrder(); saveTools(); renderAllUI(); alert('导入成功'); } else alert('格式错误'); } catch(e){ alert('解析失败'); } }; reader.readAsText(file); e.target.value=''; };
    document.getElementById('resetAllCategoryBtn').onclick=()=>{ currentCategory='all'; renderAllUI(); };
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // ----- 初始化 -----
    loadCustomCategories(); 
    loadToolOrder(); 
    initTools(); 
    const allIds = tools.map(t => t.id);
    toolOrder = toolOrder.filter(id => allIds.includes(id));
    const newIds = allIds.filter(id => !toolOrder.includes(id));
    toolOrder = toolOrder.concat(newIds);
    saveToolOrder();
    renderAllUI();
    initResize();
</script>
</body>
</html>
